name: Deal-Sniper

on:
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: deal-sniper-state
  cancel-in-progress: false

jobs:
  snipe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Dependencies installieren
        run: pip install -r requirements.txt

      - name: Telegram-Konfiguration prüfen
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PY'
          import os, httpx
          token=os.environ.get("TELEGRAM_BOT_TOKEN","").strip()
          chat=os.environ.get("TELEGRAM_CHAT_ID","").strip()
          if not token or not chat:
              raise SystemExit("FEHLER: TELEGRAM_BOT_TOKEN oder TELEGRAM_CHAT_ID fehlt in GitHub Actions Secrets.")
          for method,params in (("getMe",None),("getChat",{"chat_id":chat})):
              r=httpx.get(f"https://api.telegram.org/bot{token}/{method}",params=params,timeout=20)
              data=r.json()
              if not r.is_success or not data.get("ok"):
                  raise SystemExit(f"FEHLER: Telegram {method} fehlgeschlagen: {data}")
          print("Telegram-Konfiguration ist gültig.")
          PY

      - name: Deals prüfen
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python sniper.py

      - name: State und Dashboard committen
        if: always()
        run: |
          git config user.name "sniper-bot"
          git config user.email "actions@users.noreply.github.com"
          [ -d state ] && git add state || true
          [ -d docs ] && git add docs || true
          git diff --cached --quiet || git commit -m "Sniper-Lauf $(date -u '+%F %H:%M')"
          git pull --rebase
          git push

      - name: Fehler-Alarm per Telegram
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl --fail-with-body -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="⚠️ Deal-Sniper-Lauf fehlgeschlagen: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            echo "Fehler-Alarm übersprungen: Telegram-Secrets fehlen."
          fi
